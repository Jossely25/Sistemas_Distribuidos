version: "3.9"

services:
  mariadb-master:
    image: bitnami/mariadb:latest
    container_name: db-master
    environment:
      - MARIADB_ROOT_PASSWORD=Root123!
      - MARIADB_REPLICATION_MODE=master
      - MARIADB_REPLICATION_USER=repl_user
      - MARIADB_REPLICATION_PASSWORD=repl_pass
      - MARIADB_USER=app_user
      - MARIADB_PASSWORD=App123!
      - MARIADB_DATABASE=ecommerce_db
    volumes:
      - ./master-data:/bitnami/mariadb
    networks:
      red_interna:
        ipv4_address: 192.168.2.10

  mariadb-slave1:
    image: bitnami/mariadb:latest
    container_name: db-slave1
    environment:
      - MARIADB_ROOT_PASSWORD=Root123!
      - MARIADB_REPLICATION_MODE=slave
      - MARIADB_REPLICATION_USER=repl_user
      - MARIADB_REPLICATION_PASSWORD=repl_pass
      - MARIADB_MASTER_HOST=db-master
      - MARIADB_MASTER_PORT_NUMBER=3306
      - MARIADB_MASTER_ROOT_PASSWORD=Root123!
    volumes:
      - ./slave1-data:/bitnami/mariadb
    networks:
      red_interna:
        ipv4_address: 192.168.2.11

  mariadb-slave2:
    image: bitnami/mariadb:latest
    container_name: db-slave2
    environment:
      - MARIADB_ROOT_PASSWORD=Root123!
      - MARIADB_REPLICATION_MODE=slave
      - MARIADB_REPLICATION_USER=repl_user
      - MARIADB_REPLICATION_PASSWORD=repl_pass
      - MARIADB_MASTER_HOST=db-master
      - MARIADB_MASTER_PORT_NUMBER=3306
      - MARIADB_MASTER_ROOT_PASSWORD=Root123!
    volumes:
      - ./slave2-data:/bitnami/mariadb
    networks:
      red_interna:
        ipv4_address: 192.168.2.12

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=Admin123!
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      red_interna:
        ipv4_address: 192.168.2.30

  backend-api1:
    build: ../backend
    container_name: backend-api1
    environment:
      - DB_HOST=mariadb-master
      - DB_PORT=3306
      - DB_USER=app_user
      - DB_PASSWORD=App123!
      - DB_NAME=ecommerce_db
      - RABBIT_URL=amqp://admin:Admin123!@rabbitmq:5672
    depends_on:
      - mariadb-master
      - rabbitmq
    networks:
      red_interna:
        ipv4_address: 192.168.2.21

  backend-api2:
    build: ../backend
    container_name: backend-api2
    environment:
      - DB_HOST=mariadb-master
      - DB_PORT=3306
      - DB_USER=app_user
      - DB_PASSWORD=App123!
      - DB_NAME=ecommerce_db
      - RABBIT_URL=amqp://admin:Admin123!@rabbitmq:5672
    depends_on:
      - mariadb-master
      - rabbitmq
    networks:
      red_interna:
        ipv4_address: 192.168.2.22

  backend-api3:
    build: ../backend
    container_name: backend-api3
    environment:
      - DB_HOST=mariadb-master
      - DB_PORT=3306
      - DB_USER=app_user
      - DB_PASSWORD=App123!
      - DB_NAME=ecommerce_db
      - RABBIT_URL=amqp://admin:Admin123!@rabbitmq:5672
    depends_on:
      - mariadb-master
      - rabbitmq
    networks:
      red_interna:
        ipv4_address: 192.168.2.23

  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-api1
      - backend-api2
      - backend-api3
    ports:
      - "8080:80"
    networks:
      red_interna:
        ipv4_address: 192.168.2.40

  frontend1:
    build: ../frontend
    container_name: frontend1
    networks:
      red_interna:
        ipv4_address: 192.168.2.51

  frontend2:
    build: ../frontend
    container_name: frontend2
    networks:
      red_interna:
        ipv4_address: 192.168.2.52

  frontend3:
    build: ../frontend
    container_name: frontend3
    networks:
      red_interna:
        ipv4_address: 192.168.2.53

  frontend-lb:
    image: nginx:alpine
    container_name: frontend-lb
    volumes:
      - ./nginx-frontend.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend1
      - frontend2
      - frontend3
    ports:
      - "80:80"
    networks:
      red_interna:
        ipv4_address: 192.168.2.50


networks:
  red_interna:
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.2.0/24
